name: Run Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio httpx pytest-mock

      - name: Run tests
        run: |
          if [ ! -d "tests" ]; then
            echo "No tests/ yet — will be generated by Claude when a PR is opened."
            exit 0
          fi
          pytest tests/ -v --tb=short
